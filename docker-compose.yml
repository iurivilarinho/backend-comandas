services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "9091:9091"
    network_mode: host
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      SPRING_PROFILES_ACTIVE: prod
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}

      SERVER_PORT:  ${SERVER_PORT}
      SERVER_SSL_ENABLED: "true"
      SERVER_SSL_KEY_STORE: "file:/etc/ssl/private/keystore.jks"
      SERVER_SSL_KEY_STORE_TYPE: "JKS"
      SERVER_SSL_KEY_STORE_PASSWORD: "123456"
      SERVER_SSL_KEY_ALIAS: "springboot"

      PUSH_VAPID_PUBLIC_KEY: ${PUSH_VAPID_PUBLIC_KEY}
      PUSH_VAPID_PRIVATE_KEY: ${PUSH_VAPID_PRIVATE_KEY}
      PUSH_VAPID_SUBJECT: ${PUSH_VAPID_SUBJECT:-mailto:contato@comandas.local}
    volumes:
      - /etc/ssl/private/keystore.jks:/etc/ssl/private/keystore.jks:ro
    restart: unless-stopped
